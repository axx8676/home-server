services:
  # --- Sonarr (TV Shows) ---
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    networks:
      - media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ./sonarr/config:/config
      - /tank/media/shows:/shows #optional
      - /tank/downloads:/downloads #optional
    ports:
      - 8989:8989
    restart: unless-stopped

  # --- Radarr (Movies) ---
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    networks:
      - media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ./radarr/config:/config
      - /tank/media/movies:/movies #optional
      - /tank/downloads:/downloads #optional
    ports:
      - 7878:7878
    restart: unless-stopped

  # --- Lidarr (Music) ---
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    networks:
      - media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ./lidarr/config:/config
      - /tank/media/music:/music #optional
      - /tank/downloads:/downloads #optional
    ports:
      - 8686:8686
    restart: unless-stopped

networks:
  media:
    external: true
