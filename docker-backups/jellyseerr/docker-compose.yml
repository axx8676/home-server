services:
    jellyseerr:
       image: fallenbagel/jellyseerr:latest
       container_name: jellyseerr
       networks:
         - media
       environment:
            - PUID=1000
            - PGID=1000
            - TZ=America/Chicago
       ports:
            - 5055:5055
       volumes:
            - ./config:/app/config
       restart: unless-stopped

networks:
  media:
    external: true
