services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    networks:
      - media
    ports:
      - "8096:8096" #HTTP
      - "8920:8920" #HTTPS
    volumes:
      - ./config:/config
      - /tank/media:/media
      - ./certs:/certs:ro
    restart: unless-stopped
    
networks:
  media:
    external: true
